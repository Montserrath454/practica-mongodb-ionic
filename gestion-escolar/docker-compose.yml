services:
  php:
    build: .
    container_name: gestion_php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql
    networks:
      - escuela

  mysql:
    image: mysql:8.0
    container_name: gestion_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: escuela
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - escuela

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gestion_phpmyadmin
    restart: always
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
    ports:
      - "8081:80"
    networks:
      - escuela

volumes:
  mysql_data:

networks:
  escuela: